name: scout-cycle

# Free serverless scheduler: runs the paper scout cycle hourly, commits evidence +
# dashboard JSON back to the repo, and (optionally) pushes a Telegram update.
# The script self-gates the Opus LLM to EQUITY symbols during their MARKET HOURS
# (never crypto), and enforces ANTHROPIC_MONTHLY_BUDGET. Secrets live in
# repo Settings -> Secrets and variables -> Actions (never public).
#
# Note: hourly 24/7 is ~1,400 Actions min/mo (near the 2,000 free tier). To save
# minutes, narrow the cron to market-relevant UTC hours, e.g.:
#   - cron: "0 3-20 * * 1-5"   # ~covers NSE/BSE (03:45-10:00 UTC) + NASDAQ (13:30-20:00 UTC)
# or run it on an Oracle Cloud Always-Free VM crontab (no minute cap) — see DEPLOY.md.

on:
  schedule:
    - cron: "0 * * * *"           # top of every hour
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write                # allows committing results back

concurrency:
  group: scout-cycle
  cancel-in-progress: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}          # e.g. claude-opus-4-8
  ANTHROPIC_MONTHLY_BUDGET: ${{ secrets.ANTHROPIC_MONTHLY_BUDGET }}   # e.g. 20
  ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}  # optional: console cost reconcile
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r venture/requirements-cloud.txt

      - name: Run scout cycle (paper only; LLM gated to market-hours equities)
        run: python venture/scout_cycle.py

      - name: Export dashboard JSON (incl. billing)
        run: python venture/dashboard/export.py

      - name: Commit evidence + dashboard data
        run: |
          git config user.name  "scout-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A venture/forward_test.db venture/journal.db docs/data
          git commit -m "scout cycle $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push || echo "push skipped"
