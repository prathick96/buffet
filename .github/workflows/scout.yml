name: scout-cycle

# Free serverless scheduler: runs the paper scout cycle, commits evidence +
# dashboard JSON back to the repo, and (optionally) pushes a Telegram update.
# Secrets live in repo Settings -> Secrets and variables -> Actions (never public).

on:
  schedule:
    - cron: "30 21 * * 1-5"      # 21:30 UTC on weekdays (~after US close). Adjust as needed.
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write                # allows committing results back

concurrency:
  group: scout-cycle
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r venture/requirements-cloud.txt

      - name: Run scout cycle (paper only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python venture/scout_cycle.py

      - name: Export dashboard JSON
        run: python venture/dashboard/export.py

      - name: Commit evidence + dashboard data
        run: |
          git config user.name  "scout-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A venture/forward_test.db venture/journal.db docs/data
          git commit -m "scout cycle $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push || echo "push skipped"
